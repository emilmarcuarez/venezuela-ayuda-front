services:
  - type: web
    name: venezuela-ayuda-front
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://server-vznla-ayuda.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
